<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>BucinVerse 🌌</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MUSIC -->
<audio id="music" src="assets/music.mp3" loop></audio>

<!-- LANDING -->
<div id="landing">
  <h1 class="title">Untuk Kamu 💙</h1>
  <button onclick="start()">Masuk</button>
</div>

<!-- MAIN -->
<div id="main" class="hidden">

  <h2 id="nama">Untuk: Kamu</h2>

  <!-- SLIDER -->
  <div class="slider">
    <img src="assets/foto1.jpg" class="slide active">
    <img src="assets/foto2.jpg" class="slide">
    <img src="assets/foto3.jpg" class="slide">
  </div>

  <!-- LETTER -->
  <div class="letter">
    <p id="text">
      Aku nggak jago ngomong…  
      tapi aku tau satu hal…  
      aku nyaman sama kamu 💙
    </p>
  </div>

  <!-- BUTTON -->
  <button onclick="love()">Klik Ini 💖</button>

</div>

<script src="script.js"></script>
</body>
</html>
